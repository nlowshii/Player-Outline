plugins {
    id 'com.android.application'
}

android {

    namespace 'com.outline'

    compileSdk 34

    defaultConfig {

        applicationId "com.outline"

        minSdk 21
        targetSdk 34

        ndk {
            abiFilters 'arm64-v8a'
        }

        externalNativeBuild {

            cmake {
                cppFlags ""
            }
        }
    }

    externalNativeBuild {

        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }
}
